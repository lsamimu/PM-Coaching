name: Website CI

on:
  push:
    paths:
      - "website/**"
      - ".github/workflows/website-ci.yml"
  pull_request:
    paths:
      - "website/**"

defaults:
  run:
    working-directory: website

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders — real secrets live in Vercel only.
          NEXT_PUBLIC_SITE_URL: https://pmlaunchlab.com
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          ACCESS_TOKEN_SECRET: ci-build-placeholder-secret
          VENMO_HANDLE: placeholder
